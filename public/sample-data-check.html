<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>본사 관리 시스템 - 단일 HTML 데모</title>
    <style>
      :root {
        --bg: #f3f5f9;
        --panel: #ffffff;
        --line: #dbe2ea;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #0f172a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      }
      .app {
        display: grid;
        grid-template-columns: 290px 1fr;
        min-height: 100vh;
      }
      .side {
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 18px;
      }
      .title { margin: 0 0 6px; font-size: 34px; letter-spacing: -0.2px; }
      .desc { margin: 0 0 16px; color: var(--muted); font-size: 20px; }
      .menu { display: grid; gap: 8px; }
      .btn {
        border: 1px solid #cfd7e3;
        background: #fff;
        color: #12243f;
        text-align: left;
        border-radius: 10px;
        padding: 11px 13px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn.active { background: #0b1b3d; color: #fff; border-color: #0b1b3d; }
      .small { margin-top: 16px; color: var(--muted); font-size: 13px; line-height: 1.5; }

      .main { padding: 14px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .h1 { margin: 0 0 10px; font-size: 23px; }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 10px; }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #fbfcff;
      }
      .k { font-size: 12px; color: var(--muted); }
      .v { margin-top: 6px; font-size: 34px; font-weight: 700; }

      .grid2 { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        min-height: 290px;
      }
      .chart h3 { margin: 0 0 8px; font-size: 15px; }
      .bars { display: grid; gap: 8px; }
      .bar-row { display: grid; grid-template-columns: 96px 1fr 58px; gap: 8px; align-items: center; font-size: 13px; }
      .bar-track { height: 10px; background: #e9eef6; border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; background: #0f172a; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 8px 7px; border-bottom: 1px solid #e5eaf1; text-align: left; }
      th { background: #f8fafc; }
      .right { text-align: right; }

      .filters { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
      .filters input, .filters select {
        border: 1px solid #cfd7e3;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
        background: #fff;
      }

      @media (max-width: 1000px) {
        .app { grid-template-columns: 1fr; }
        .side { border-right: 0; border-bottom: 1px solid var(--line); }
        .cards, .grid2, .filters { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <h1 class="title">전체 프로그램 보기</h1>
        <p class="desc">HTML 단독 실행 데모</p>
        <div class="menu" id="menu"></div>
        <p class="small">
          이 파일은 서버 연결 없이 동작합니다.<br />
          더블클릭으로 직접 열어도 바로 확인 가능합니다.
        </p>
      </aside>
      <main class="main">
        <section class="panel" id="screen"></section>
      </main>
    </div>

    <script>
      const programs = Array.from({ length: 8 }, (_, i) => `프로그램 ${i + 1}`);
      const regions = ["서울", "부산", "대구", "인천", "광주", "대전", "울산", "경기", "강원", "제주"];
      const months = (() => {
        const out = [];
        const now = new Date();
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          out.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
        }
        return out;
      })();

      const branches = Array.from({ length: 10 }, (_, i) => ({
        branchCode: `BR${String(i + 1).padStart(3, "0")}`,
        name: `${regions[i]}지사`,
        region: regions[i],
        status: i === 8 ? "inactive" : "active",
        manager: `담당자${i + 1}`,
        phone: `0${i % 2 ? "51" : "2"}-${1000 + i}-${2000 + i}`,
        updatedAt: `2026-04-${String((i % 9) + 1).padStart(2, "0")}`,
      }));

      const permissions = {};
      const sales = {};
      branches.forEach((b, bi) => {
        permissions[b.branchCode] = programs.map((_, pi) => (bi + pi) % 3 !== 0);
        sales[b.branchCode] = {};
        months.forEach((m, mi) => {
          sales[b.branchCode][m] = programs.map((_, pi) => {
            const base = (bi + 1) * 4 + (pi + 1) * 3 + (mi % 6);
            return permissions[b.branchCode][pi] ? (b.status === "inactive" ? Math.floor(base * 0.4) : base) : 0;
          });
        });
      });

      const currentMonth = months[months.length - 1];
      const prevMonth = months[months.length - 2];

      const screens = [
        { key: "dashboard", label: "대시보드", render: renderDashboard },
        { key: "branches", label: "지사 관리", render: renderBranches },
        { key: "new", label: "지사 등록", render: renderNewBranch },
        { key: "permissions", label: "판매권한 관리", render: renderPermissions },
        { key: "sales", label: "판매부수 관리", render: renderSales },
      ];

      const menuEl = document.getElementById("menu");
      const screenEl = document.getElementById("screen");

      function monthTotal(m) {
        return branches.reduce((sum, b) => sum + sales[b.branchCode][m].reduce((a, v) => a + v, 0), 0);
      }

      function setActive(key) {
        document.querySelectorAll(".btn").forEach((b) => b.classList.toggle("active", b.dataset.key === key));
      }

      function renderDashboard() {
        const curr = monthTotal(currentMonth);
        const prev = monthTotal(prevMonth);
        const rate = prev === 0 ? 100 : ((curr - prev) / prev) * 100;
        const byProgram = programs.map((p, pi) => ({
          name: p,
          value: branches.reduce((sum, b) => sum + sales[b.branchCode][currentMonth][pi], 0),
        }));
        const max = Math.max(...byProgram.map((x) => x.value), 1);

        const trend = months.map((m) => ({ m, v: monthTotal(m) }));
        const tmax = Math.max(...trend.map((x) => x.v), 1);

        screenEl.innerHTML = `
          <h2 class="h1">대시보드</h2>
          <div class="cards">
            <div class="card"><div class="k">이번 달 총 판매 부수 (${currentMonth})</div><div class="v">${curr.toLocaleString()}</div></div>
            <div class="card"><div class="k">전월 대비 증감률 (${prevMonth} 대비)</div><div class="v" style="color:${rate >= 0 ? "#059669" : "#dc2626"}">${rate >= 0 ? "+" : ""}${rate.toFixed(1)}%</div></div>
          </div>
          <div class="grid2">
            <div class="chart">
              <h3>프로그램별 판매 부수</h3>
              <div class="bars">
                ${byProgram
                  .map(
                    (x) => `<div class="bar-row"><span>${x.name}</span><div class="bar-track"><div class="bar-fill" style="width:${(x.value / max) * 100}%"></div></div><strong class="right">${x.value}</strong></div>`,
                  )
                  .join("")}
              </div>
            </div>
            <div class="chart">
              <h3>월별 판매 부수 추이</h3>
              <div class="bars">
                ${trend
                  .map(
                    (x) => `<div class="bar-row"><span>${x.m}</span><div class="bar-track"><div class="bar-fill" style="width:${(x.v / tmax) * 100}%"></div></div><strong class="right">${x.v}</strong></div>`,
                  )
                  .join("")}
              </div>
            </div>
          </div>
        `;
      }

      function renderBranches() {
        const rows = branches
          .map((b) => {
            const enabled = permissions[b.branchCode].filter(Boolean).length;
            const total = sales[b.branchCode][currentMonth].reduce((a, v) => a + v, 0);
            return { ...b, enabled, total };
          })
          .sort((a, b) => b.total - a.total);

        screenEl.innerHTML = `
          <h2 class="h1">지사 관리</h2>
          <div class="filters">
            <input placeholder="지사명 검색(데모)" />
            <input placeholder="지역 필터(데모)" />
            <select><option>전체 상태</option><option>active</option><option>inactive</option></select>
            <select><option>최근 수정일</option><option>지사명</option><option>판매부수</option></select>
          </div>
          <table>
            <thead><tr><th>지사코드</th><th>지사명</th><th>지역</th><th>상태</th><th class="right">활성 프로그램</th><th class="right">이번 달 판매부수</th><th>최근 수정일</th></tr></thead>
            <tbody>
              ${rows
                .map(
                  (r) => `<tr><td>${r.branchCode}</td><td>${r.name}</td><td>${r.region}</td><td>${r.status}</td><td class="right">${r.enabled}</td><td class="right">${r.total}</td><td>${r.updatedAt}</td></tr>`,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function renderNewBranch() {
        screenEl.innerHTML = `
          <h2 class="h1">지사 등록 (데모 화면)</h2>
          <div class="filters">
            <input placeholder="지사명" />
            <input placeholder="지역" />
            <select><option>active</option><option>inactive</option></select>
            <input placeholder="담당자" />
            <input placeholder="연락처" />
            <input placeholder="메모" style="grid-column: span 3;" />
          </div>
          <p class="small">단일 HTML 데모이므로 저장은 동작하지 않고 화면만 확인됩니다.</p>
        `;
      }

      function renderPermissions() {
        screenEl.innerHTML = `
          <h2 class="h1">판매권한 관리</h2>
          <table>
            <thead>
              <tr>
                <th>지사</th>
                ${programs.map((p) => `<th class="right">${p}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${branches
                .map((b) => {
                  const cols = permissions[b.branchCode].map((v) => `<td class="right"><strong>${v ? "O" : "X"}</strong></td>`).join("");
                  return `<tr><td>${b.name}</td>${cols}</tr>`;
                })
                .join("")}
            </tbody>
          </table>
          <p class="small">엑셀 업로드/미리보기는 실제 앱에서 동작하며, 이 HTML은 전체 화면 데모용입니다.</p>
        `;
      }

      function renderSales() {
        screenEl.innerHTML = `
          <h2 class="h1">판매부수 관리 (${currentMonth})</h2>
          <table>
            <thead>
              <tr>
                <th>지사</th>
                ${programs.map((p) => `<th class="right">${p}</th>`).join("")}
                <th class="right">합계</th>
              </tr>
            </thead>
            <tbody>
              ${branches
                .map((b) => {
                  const arr = sales[b.branchCode][currentMonth];
                  const total = arr.reduce((a, v) => a + v, 0);
                  const cols = arr.map((v) => `<td class="right">${v}</td>`).join("");
                  return `<tr><td>${b.name}</td>${cols}<td class="right"><strong>${total}</strong></td></tr>`;
                })
                .join("")}
            </tbody>
          </table>
        `;
      }

      screens.forEach((s, i) => {
        const b = document.createElement("button");
        b.className = "btn" + (i === 0 ? " active" : "");
        b.textContent = s.label;
        b.dataset.key = s.key;
        b.addEventListener("click", () => {
          setActive(s.key);
          s.render();
        });
        menuEl.appendChild(b);
      });

      renderDashboard();
    </script>
  </body>
</html>
